name: Publish Release

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish for a manual test run. Defaults to <package-version>-test.<run-number>."
        required: false
        type: string
      dist_tag:
        description: "npm dist-tag for manual publishes."
        required: false
        default: next
        type: string
      dry_run:
        description: "Run npm publish --dry-run instead of publishing."
        required: true
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Show publish runtime
        run: |
          node --version
          npm --version

      - name: Set package version from release tag
        if: ${{ github.event_name == 'release' }}
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME#v}"
          npm version "$RELEASE_TAG" --no-git-tag-version --allow-same-version

      - name: Set package version for manual test
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            TEST_VERSION="${{ inputs.version }}"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
            TEST_VERSION="${BASE_VERSION}-test.${GITHUB_RUN_NUMBER}"
          fi
          npm version "$TEST_VERSION" --no-git-tag-version --allow-same-version
          echo "MANUAL_VERSION=${TEST_VERSION}" >> "$GITHUB_ENV"

      - name: Set package version for main beta
        if: ${{ github.event_name == 'push' }}
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA="${GITHUB_SHA::7}"
          BETA_VERSION="${BASE_VERSION}-beta.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"
          npm version "$BETA_VERSION" --no-git-tag-version --allow-same-version
          echo "BETA_VERSION=${BETA_VERSION}" >> "$GITHUB_ENV"

      - name: Show package version
        run: node -p "'Publishing harness-engine@' + require('./package.json').version"

      - name: Pack package
        run: |
          mkdir -p dist
          npm pack --pack-destination dist

      - name: Upload packed package
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: harness-engine-${{ github.run_number }}
          path: dist/*.tgz
          if-no-files-found: error

      - name: Publish latest to npm
        if: ${{ github.event_name == 'release' }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main beta to npm
        if: ${{ github.event_name == 'push' }}
        run: npm publish --access public --provenance --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run manual publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm publish --access public --tag "${{ inputs.dist_tag }}" --dry-run

      - name: Publish manual test package
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
        run: npm publish --access public --provenance --tag "${{ inputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
